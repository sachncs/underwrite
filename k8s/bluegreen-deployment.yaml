apiVersion: apps/v1
kind: Deployment
metadata:
  name: ulu-api-blue
  namespace: ulu
  labels:
    app: ulu-api
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ulu-api
      version: blue
  template:
    metadata:
      labels:
        app: ulu-api
        version: blue
    spec:
      containers:
        - name: api
          image: ulu:blue
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: ulu-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ulu-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ulu-secrets
                  key: JWT_SECRET
            - name: ALGOD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ulu-secrets
                  key: ALGOD_TOKEN
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
