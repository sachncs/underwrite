apiVersion: v1
kind: Service
metadata:
  name: ulu-api-active
  namespace: ulu
  labels:
    app: ulu-api
spec:
  type: ClusterIP
  selector:
    app: ulu-api
    version: blue
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: ulu-api-preview
  namespace: ulu
  labels:
    app: ulu-api
spec:
  type: ClusterIP
  selector:
    app: ulu-api
    version: green
  ports:
    - port: 8000
      targetPort: 8000
      name: http
