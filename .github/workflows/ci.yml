name: CI

on:
  push:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: PYTHONPATH=. PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q

  container-gate:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ulu:ci .
      - name: Start container
        run: |
          docker run -d --name ulu-ci -p 8000:8000 ulu:ci
          sleep 3
      - name: Health check
        run: |
          curl --fail http://localhost:8000/health
          curl --fail http://localhost:8000/ready
      - name: Stop container
        if: always()
        run: docker rm -f ulu-ci || true
