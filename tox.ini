[tox]
envlist = py39, py310, py311, py312, lint, typecheck
skip_missing_interpreters = true

[testenv]
deps =
    pytest>=7
    pytest-cov>=4
commands =
    python -m pytest tests/ -q --tb=short {posargs}

[testenv:lint]
deps = ruff>=0.1
commands = ruff check underwrite/

[testenv:typecheck]
deps = mypy>=1.0
commands = mypy underwrite/ --ignore-missing-imports
